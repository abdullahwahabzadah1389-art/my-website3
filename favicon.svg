<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- This creates a perfect circular clipping mask -->
    <clipPath id="circleView">
      <circle cx="256" cy="256" r="256" />
    </clipPath>
  </defs>

  <!-- This applies the circle crop to your logo -->
  <g clip-path="url(#circleView)">
    <image href="logo.png" x="0" y="0" width="512" height="512" preserveAspectRatio="xMidYMid slice" />
  </g>
</svg>

